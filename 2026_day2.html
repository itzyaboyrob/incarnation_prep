<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREP Day 2 – Building Virtue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --burgundy: #6B1E2E;
  --burgundy-light: #F5EAEC;
  --burgundy-mid: #9B3A4E;
  --burgundy-dark: #3D0E1A;
  --amber: #C47F1A;
  --amber-light: #FDF4DC;
  --amber-dark: #8A5A10;
  --cream: #FAF6F0;
  --gray: #6B7280;
  --gray-light: #F3F4F6;
  --text: #1C1C1E;
  --text-muted: #5A4A4E;
}

html, body { width:100%; height:100%; font-family:'Inter',sans-serif; background:var(--burgundy-dark); overflow:hidden; }

/* ── JOURNEY BAR ── */
#journey { position:fixed; top:0; left:0; right:0; background:var(--burgundy-dark); display:flex; align-items:center; justify-content:center; gap:0; padding:8px 24px; z-index:200; }
.journey-step { display:flex; align-items:center; gap:0; }
.journey-dot { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:default; }
.journey-icon { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:14px; transition:all 0.4s ease; }
.journey-label { font-size:9px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:rgba(255,255,255,0.3); transition:color 0.4s ease; white-space:nowrap; }
.journey-line { width:36px; height:2px; background:rgba(255,255,255,0.15); margin:0 2px; margin-bottom:14px; transition:background 0.4s ease; }
.journey-step.active .journey-icon { background:var(--amber); border-color:var(--amber); box-shadow:0 0 12px rgba(196,127,26,0.5); }
.journey-step.active .journey-label { color:var(--amber); }
.journey-step.done .journey-icon { background:rgba(196,127,26,0.3); border-color:rgba(196,127,26,0.5); }
.journey-step.done .journey-label { color:rgba(255,255,255,0.5); }
.journey-step.done + .journey-line, .journey-step.active + .journey-line { background:rgba(196,127,26,0.4); }

/* ── DECK / SLIDES ── */
#deck { position:fixed; top:62px; bottom:52px; left:0; right:0; overflow:hidden; }
.slide { position:absolute; inset:0; display:flex; flex-direction:column; background:var(--cream); opacity:0; transform:translateY(28px); transition:opacity 0.5s ease, transform 0.5s ease; pointer-events:none; overflow:hidden; }
.slide.active { opacity:1; transform:translateY(0); pointer-events:all; }
.slide.exit { opacity:0; transform:translateY(-20px); }
.slide.hero { background:var(--burgundy-dark); justify-content:center; align-items:center; }
.slide.hero-warm { background:linear-gradient(135deg,#3D0E1A 0%,#6B1E2E 60%,#4a1520 100%); }

/* ── RAY ── */
.ray { position:absolute; top:-100px; left:-100px; width:600px; height:600px; background:conic-gradient(from 200deg at 0% 0%, transparent 0deg, rgba(196,127,26,0.06) 15deg, transparent 30deg, rgba(196,127,26,0.03) 48deg, transparent 62deg); pointer-events:none; z-index:0; animation:shimmer 9s ease-in-out infinite alternate; }
@keyframes shimmer { from{opacity:0.6;transform:rotate(-4deg) scale(1)} to{opacity:1;transform:rotate(4deg) scale(1.05)} }

/* ── SLIDE BODY ── */
.slide-body { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px 60px; position:relative; z-index:1; overflow:hidden; }
.slide-body > * { width:100%; max-width:900px; }

/* ── TYPOGRAPHY ── */
h2.slide-title { font-family:'Playfair Display',serif; font-size:clamp(2rem,4.5vw,3.2rem); font-weight:700; color:var(--burgundy); line-height:1.2; margin-bottom:14px; }
h1.hero-title { font-family:'Playfair Display',serif; font-size:clamp(2.8rem,7vw,5.5rem); font-weight:700; color:#fff; line-height:1.05; text-align:center; margin-bottom:16px; }
h2.hero-subtitle { font-family:'Inter',sans-serif; font-size:clamp(1rem,2.5vw,1.4rem); font-weight:400; color:rgba(255,255,255,0.65); text-align:center; line-height:1.5; max-width:600px; }
.hero-word { font-family:'Playfair Display',serif; font-size:clamp(4rem,12vw,9rem); font-weight:700; color:var(--amber); text-align:center; line-height:1; letter-spacing:-0.02em; }
.hero-def { font-size:clamp(1.1rem,2.5vw,1.5rem); color:rgba(255,255,255,0.8); text-align:center; max-width:640px; line-height:1.6; margin-top:20px; }
.hero-simpler { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1rem,2vw,1.2rem); color:rgba(196,127,26,0.85); text-align:center; margin-top:12px; }
.hero-cross { font-size:clamp(3rem,7vw,5rem); color:var(--amber); text-align:center; margin-bottom:20px; display:block; animation:pulse-cross 3s ease-in-out infinite; }
@keyframes pulse-cross { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.75;transform:scale(0.97)} }
.body-text { font-size:clamp(1.05rem,2.1vw,1.3rem); color:var(--text-muted); line-height:1.7; max-width:900px; }

/* ── BULLETS ── */
.bullet-list { list-style:none; margin-top:8px; }
.bullet-list li { display:flex; align-items:flex-start; gap:14px; font-size:clamp(1.05rem,2vw,1.3rem); color:var(--text); padding:8px 0; line-height:1.5; opacity:0; transform:translateX(-16px); transition:opacity 0.4s ease, transform 0.4s ease; }
.bullet-list li.visible { opacity:1; transform:translateX(0); }
.bullet-list li::before { content:''; display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--amber); flex-shrink:0; margin-top:7px; }

/* ── SECTION BADGE ── */
.section-badge { display:inline-flex; align-items:center; gap:8px; background:var(--burgundy-light); color:var(--burgundy); border-radius:999px; padding:5px 16px; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:16px; }

/* ── CARDS ── */
.card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-top:18px; }
.card { background:var(--burgundy-light); border-radius:14px; padding:18px 20px; border:1px solid rgba(107,30,46,0.15); opacity:0; transform:translateY(12px); transition:opacity 0.4s ease, transform 0.4s ease; }
.card.visible { opacity:1; transform:translateY(0); }
.card .card-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--burgundy-mid); margin-bottom:5px; }
.card .card-text { font-size:1rem; color:var(--burgundy); font-weight:600; line-height:1.3; }

/* ── HIGHLIGHT BOX ── */
.highlight-box { background:var(--amber-light); border-left:4px solid var(--amber); border-radius:0 12px 12px 0; padding:16px 22px; margin:14px 0; max-width:720px; }
.highlight-box .hb-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--amber-dark); margin-bottom:5px; }
.highlight-box p { font-size:1.1rem; color:var(--text); line-height:1.6; }

/* ── DARK BOX ── */
.dark-box { background:var(--burgundy); border-radius:14px; padding:20px 26px; margin:14px 0; max-width:760px; }
.dark-box p { color:#fff; font-size:1.15rem; line-height:1.6; }
.dark-box .db-title { font-family:'Playfair Display',serif; color:var(--amber); font-size:1.25rem; font-weight:700; margin-bottom:8px; }

/* ── DISCUSS BOX ── */
.discuss-box { display:inline-flex; align-items:flex-start; gap:14px; background:var(--gray-light); border-radius:14px; padding:16px 20px; margin-top:16px; max-width:720px; }
.discuss-icon { font-size:1.5rem; flex-shrink:0; margin-top:2px; }
.discuss-text { font-size:1.05rem; color:var(--text); line-height:1.5; }
.discuss-text strong { color:var(--burgundy); font-weight:600; display:block; margin-bottom:3px; }

/* ── VOCAB TAGS ── */
.vocab-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; }
.vocab-tag { background:var(--burgundy); color:#fff; border-radius:999px; padding:6px 18px; font-size:0.9rem; font-weight:500; opacity:0; transform:scale(0.85); transition:opacity 0.35s ease, transform 0.35s ease; }
.vocab-tag.visible { opacity:1; transform:scale(1); }

/* ── SCHEDULE ── */
.schedule-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-top:16px; }
.sched-item { background:var(--burgundy-light); border-radius:12px; padding:12px 14px; border-left:3px solid var(--burgundy); opacity:0; transform:translateY(10px); transition:opacity 0.35s ease, transform 0.35s ease; }
.sched-item.visible { opacity:1; transform:translateY(0); }
.sched-item.gold-accent { border-color:var(--amber); }
.sched-time { font-size:10px; font-weight:700; letter-spacing:0.08em; color:var(--burgundy); margin-bottom:3px; }
.sched-item.gold-accent .sched-time { color:var(--amber-dark); }
.sched-label { font-size:0.88rem; color:var(--text); font-weight:500; line-height:1.3; }

/* ── INTRO PROMPT ── */
.intro-prompt { background:var(--burgundy-light); border-radius:16px; padding:20px 26px; margin-top:16px; max-width:720px; line-height:1.7; font-size:clamp(1rem,2vw,1.2rem); color:var(--text); }
.intro-prompt strong { color:var(--burgundy); }

/* ── TWO COL ── */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:start; }

/* ── FADE ── */
.fade-in { opacity:0; transform:translateY(14px); transition:opacity 0.5s ease, transform 0.5s ease; }
.fade-in.visible { opacity:1; transform:translateY(0); }

/* ── HIDDEN REVEAL (click arrow to show) ── */
.arrow-reveal { opacity:0; transform:translateY(12px); transition:opacity 0.5s ease, transform 0.5s ease; pointer-events:none; }
.arrow-reveal.shown { opacity:1; transform:translateY(0); pointer-events:all; }

/* ── VIRTUE PANELS ── */
.shield-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:20px; max-width:680px; }
.virtue-panel { border-radius:14px; padding:20px 22px; cursor:pointer; border:2px solid transparent; opacity:0; transform:translateY(12px); transition:opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, box-shadow 0.2s; }
.virtue-panel.visible { opacity:1; transform:translateY(0); }
.virtue-panel:hover { border-color:var(--amber); box-shadow:0 4px 18px rgba(196,127,26,0.2); }
.virtue-panel.prudence { background:#EFF3FB; }
.virtue-panel.justice { background:#FDF4DC; }
.virtue-panel.temperance { background:#F0F7EE; }
.virtue-panel.fortitude { background:#F5EAEC; }
.virtue-panel .vp-icon { font-size:2rem; margin-bottom:8px; }
.virtue-panel .vp-name { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--burgundy); margin-bottom:4px; }
.virtue-panel .vp-def { font-size:0.88rem; color:var(--text-muted); line-height:1.4; }

/* ── TWO TYPES OF VIRTUE ── */
.virtue-type-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:18px; max-width:820px; }
.virtue-type-card { border-radius:16px; padding:28px 30px; opacity:0; transform:translateY(14px); transition:opacity 0.5s ease, transform 0.5s ease; }
.virtue-type-card.visible { opacity:1; transform:translateY(0); }
.virtue-type-card.natural { background:#EFF3FB; border:2px solid #B8CCF0; }
.virtue-type-card.supernatural { background:linear-gradient(135deg,#3D0E1A,#6B1E2E); border:2px solid var(--amber); }
.vtc-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:8px; }
.natural .vtc-label { color:#1B4F8C; }
.supernatural .vtc-label { color:var(--amber); }
.vtc-name { font-family:'Playfair Display',serif; font-size:1.55rem; font-weight:700; margin-bottom:10px; line-height:1.2; }
.natural .vtc-name { color:var(--burgundy); }
.supernatural .vtc-name { color:#fff; }
.vtc-def { font-size:1rem; line-height:1.5; margin-bottom:12px; }
.natural .vtc-def { color:var(--text-muted); }
.supernatural .vtc-def { color:rgba(255,255,255,0.7); }
.vtc-examples { list-style:none; }
.vtc-examples li { font-size:1rem; padding:5px 0; display:flex; align-items:center; gap:8px; }
.natural .vtc-examples li { color:var(--text); }
.supernatural .vtc-examples li { color:rgba(255,255,255,0.85); }
.vtc-examples li::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.natural .vtc-examples li::before { background:var(--amber); }
.supernatural .vtc-examples li::before { background:var(--amber); }

/* ── SUPERNATURAL BREAKDOWN ── */
.super-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:18px; max-width:820px; }
.super-card { border-radius:16px; padding:22px 24px; opacity:0; transform:translateY(14px); transition:opacity 0.5s ease, transform 0.5s ease; }
.super-card.visible { opacity:1; transform:translateY(0); }
.super-card.theological { background:linear-gradient(135deg,#3D0E1A,#6B1E2E); border:2px solid var(--amber); }
.super-card.moral { background:var(--burgundy-light); border:2px solid var(--burgundy-mid); }
.sc-title { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; margin-bottom:6px; }
.theological .sc-title { color:var(--amber); }
.moral .sc-title { color:var(--burgundy); }
.sc-subtitle { font-size:0.82rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:12px; }
.theological .sc-subtitle { color:rgba(255,255,255,0.5); }
.moral .sc-subtitle { color:var(--burgundy-mid); }
.sc-list { list-style:none; }
.sc-list li { padding:5px 0; font-size:0.95rem; display:flex; align-items:center; gap:9px; }
.theological .sc-list li { color:rgba(255,255,255,0.85); }
.moral .sc-list li { color:var(--text); }
.sc-list li::before { content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.theological .sc-list li::before { background:var(--amber); }
.moral .sc-list li::before { background:var(--burgundy-mid); }
.sc-note { font-size:0.85rem; margin-top:10px; font-style:italic; line-height:1.5; }
.theological .sc-note { color:rgba(255,255,255,0.5); }
.moral .sc-note { color:var(--text-muted); }

/* ── GAMESHOW FLIP CARDS ── */
.gameshow-header { text-align:center; margin-bottom:6px; }
.gameshow-badge { display:inline-flex; align-items:center; gap:8px; background:var(--amber); color:#fff; border-radius:999px; padding:5px 18px; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:10px; }
.game-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:6px; max-width:900px; }
.game-card { perspective:900px; cursor:pointer; height:200px; opacity:0; transform:translateY(12px); transition:opacity 0.4s ease, transform 0.4s ease; }
.game-card.visible { opacity:1; transform:translateY(0); }
.game-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform 0.55s ease; }
.game-card.flipped .game-inner { transform:rotateY(180deg); }
.game-front, .game-back { position:absolute; inset:0; border-radius:14px; backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px 18px; text-align:center; }
.game-front { background:var(--burgundy); border:2px solid rgba(196,127,26,0.35); }
.game-front .gf-num { font-size:0.72rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:rgba(196,127,26,0.6); margin-bottom:8px; }
.game-front .gf-scenario { font-size:1rem; color:rgba(255,255,255,0.88); line-height:1.45; }
.game-front .gf-tap { font-size:0.72rem; color:rgba(255,255,255,0.3); margin-top:10px; letter-spacing:0.06em; text-transform:uppercase; }
.game-back { background:var(--amber-light); border:2px solid var(--amber); transform:rotateY(180deg); }
.game-back .gb-virtue { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; color:var(--burgundy); margin-bottom:6px; }
.game-back .gb-reason { font-size:0.92rem; color:var(--text-muted); line-height:1.4; }

/* ── HERO CARD GRID ── */
.hero-card-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-top:12px; max-width:900px; }
.hero-card { border-radius:16px; overflow:hidden; cursor:pointer; border:3px solid transparent; background:var(--burgundy-light); opacity:0; transform:translateY(14px); transition:opacity 0.4s ease, transform 0.4s ease, border-color 0.25s, box-shadow 0.25s; }
.hero-card.visible { opacity:1; transform:translateY(0); }
.hero-card:hover { border-color:var(--amber); transform:translateY(-4px); box-shadow:0 8px 24px rgba(196,127,26,0.25); }
.hero-card-img { width:100%; aspect-ratio:2/3; object-fit:cover; background:linear-gradient(135deg,var(--burgundy-dark),var(--burgundy-mid)); display:flex; align-items:center; justify-content:center; font-size:4rem; }
.hero-card-footer { padding:10px 12px; }
.hero-card-name { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--burgundy); }
.hero-card-virtue { font-size:0.78rem; color:var(--amber-dark); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-top:2px; }

/* ── HERO MODAL ── */
#hero-modal { position:fixed; inset:0; z-index:500; background:rgba(61,14,26,0.88); display:none; align-items:center; justify-content:center; padding:24px; }
#hero-modal.open { display:flex; animation:modal-in 0.3s ease; }
@keyframes modal-in { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.modal-inner { background:var(--cream); border-radius:20px; max-width:780px; width:100%; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,0.4); display:flex; flex-direction:row; max-height:90vh; }
.modal-hero-img { width:260px; min-width:260px; object-fit:cover; object-position:top; background:linear-gradient(135deg,var(--burgundy-dark),var(--burgundy-mid)); display:flex; align-items:center; justify-content:center; font-size:6rem; flex-shrink:0; overflow:hidden; }
.modal-hero-img img { width:100%; height:100%; object-fit:cover; object-position:top; }
.modal-body { padding:24px 28px; overflow-y:auto; display:flex; flex-direction:column; justify-content:center; }
.modal-hero-name { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--burgundy); margin-bottom:4px; }
.modal-virtue-tag { display:inline-block; background:var(--amber); color:#fff; border-radius:999px; padding:4px 14px; font-size:0.82rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:16px; }
.modal-questions { list-style:none; }
.modal-questions li { display:flex; gap:12px; align-items:flex-start; padding:9px 0; font-size:1rem; color:var(--text); line-height:1.5; border-bottom:1px solid rgba(107,30,46,0.08); }
.modal-questions li:last-child { border-bottom:none; }
.modal-questions li::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--amber); flex-shrink:0; margin-top:7px; }
.modal-close { margin:0 28px 20px; padding:10px; background:var(--burgundy); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:0.95rem; font-weight:600; letter-spacing:0.04em; }
.modal-close:hover { background:var(--burgundy-mid); }

/* ── FOUR CORNERS ── */
.corners-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px; max-width:680px; }
.corner-tag { border-radius:14px; padding:16px 20px; text-align:center; opacity:0; transform:scale(0.9); transition:opacity 0.35s ease, transform 0.35s ease; }
.corner-tag.visible { opacity:1; transform:scale(1); }
.corner-tag .ct-icon { font-size:1.8rem; margin-bottom:6px; }
.corner-tag .ct-name { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:700; }
.corner-tag.prudence { background:#EFF3FB; color:#1B4F8C; }
.corner-tag.justice { background:#FDF4DC; color:#8A5A10; }
.corner-tag.temperance { background:#F0F7EE; color:#2D6A2D; }
.corner-tag.fortitude { background:#F5EAEC; color:var(--burgundy); }

/* ── SCENARIO CARD ── */
.scenario-card { background:var(--burgundy); border-radius:16px; padding:24px 28px; margin-top:14px; max-width:720px; }
.scenario-card .sc-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--amber); margin-bottom:8px; }
.scenario-card p { color:#fff; font-size:1.2rem; line-height:1.6; }

/* ── CHALLENGE CARD ── */
.challenge-card { background:var(--burgundy); border-radius:16px; padding:24px 28px; max-width:720px; margin-top:16px; }
.challenge-card .cc-title { font-family:'Playfair Display',serif; color:var(--amber); font-size:1.25rem; font-weight:700; margin-bottom:14px; }
.challenge-fill { background:rgba(255,255,255,0.07); border-radius:10px; padding:14px 18px; margin-bottom:10px; font-size:1rem; color:rgba(255,255,255,0.75); line-height:1.5; }
.challenge-fill span { color:var(--amber); font-style:italic; }

/* ── REVEAL LIST ── */
.reveal-list { list-style:none; margin-top:12px; display:flex; flex-wrap:wrap; gap:10px; }
.reveal-item { background:var(--burgundy); color:#fff; border-radius:999px; padding:7px 20px; font-size:0.95rem; font-weight:500; opacity:0; transform:scale(0.85) translateY(6px); transition:opacity 0.4s ease, transform 0.4s ease; }
.reveal-item.visible { opacity:1; transform:scale(1) translateY(0); }

/* ── ROSARY STEP SLIDES ── */
.rosary-step-wrap { display:flex; flex-direction:column; align-items:center; width:100%; max-width:820px; }
.rosary-step-num { font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--burgundy-mid); margin-bottom:8px; }
.rosary-step-bead { width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:700; color:#fff; border:3px solid var(--amber); box-shadow:0 0 16px rgba(196,127,26,0.3); flex-shrink:0; }
.rosary-prayer-card { background:var(--burgundy); border-radius:14px; padding:18px 24px; margin:8px 0; width:100%; max-width:700px; }
.rosary-prayer-card .rpc-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--amber); margin-bottom:8px; }
.rosary-prayer-card .rpc-text { font-size:1rem; color:rgba(255,255,255,0.88); line-height:1.8; }

/* ── NAV ── */
#nav { position:fixed; bottom:0; left:0; right:0; height:52px; background:var(--burgundy-dark); display:flex; align-items:center; justify-content:center; gap:16px; z-index:200; }
#nav button { background:none; border:none; color:rgba(255,255,255,0.8); font-size:18px; cursor:pointer; padding:6px 14px; border-radius:8px; transition:background 0.2s, color 0.2s; font-weight:600; }
#nav button:hover { background:rgba(255,255,255,0.12); color:#fff; }
#nav button:disabled { opacity:0.25; cursor:default; }
#nav-title { font-size:12px; color:rgba(255,255,255,0.6); font-weight:500; min-width:200px; text-align:center; letter-spacing:0.04em; }

/* ── PROGRESS ── */
#progress { position:fixed; top:62px; left:0; height:2px; background:var(--amber); transition:width 0.4s ease; z-index:300; }
</style>

  goToSlide(29);
}

// ── HERO MODAL ──
function openHeroModal(hero) {
  const modalImg = document.getElementById('modal-img');
  if (hero.img) { modalImg.innerHTML = `<img src="${hero.img}" alt="${hero.name}" style="width:100%;height:100%;object-fit:cover;object-position:top;">`; }
  else { modalImg.textContent = hero.emoji; modalImg.innerHTML = hero.emoji; }
  document.getElementById('modal-name').textContent = hero.name;
  document.getElementById('modal-virtue').textContent = hero.virtue;
  document.getElementById('modal-questions').innerHTML = hero.questions.map(q=>`<li>${q}</li>`).join('');
  document.getElementById('hero-modal').classList.add('open');
}
function closeHeroModal() { document.getElementById('hero-modal').classList.remove('open'); }
document.getElementById('hero-modal').addEventListener('click', function(e){ if(e.target===this) closeHeroModal(); });

function buildHeroCards() {
  const grid = document.getElementById('hero-card-grid');
  if (!grid || grid.children.length > 0) return;
  HEROES.forEach((hero,i) => {
    const card = document.createElement('div');
    card.className = 'hero-card';
    const imgHtml = hero.img
      ? `<img src="${hero.img}" alt="${hero.name}" style="width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;display:block;border-radius:13px 13px 0 0;">`
      : `<div class="hero-card-img">${hero.emoji}</div>`;
    card.innerHTML = `${imgHtml}<div class="hero-card-footer"><div class="hero-card-name">${hero.name}</div></div>`;
    card.addEventListener('click', ()=>openHeroModal(hero));
    grid.appendChild(card);
    setTimeout(()=>card.classList.add('visible'), 120 + i*90);
  });
}

function buildGameCards() {
  const grid = document.getElementById('game-grid');
  if (!grid || grid.children.length > 0) return;
  GAME_SCENARIOS.forEach((s,i) => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="game-inner">
        <div class="game-front">
          <div class="gf-num">Scenario ${s.num}</div>
          <div class="gf-scenario">${s.scenario}</div>
          <div class="gf-tap">Tap to reveal</div>
        </div>
        <div class="game-back">
          <div class="gb-virtue">${s.virtue}</div>
          <div class="gb-reason">${s.reason}</div>
        </div>
      </div>`;
    card.addEventListener('click', ()=>card.classList.toggle('flipped'));
    grid.appendChild(card);
    setTimeout(()=>card.classList.add('visible'), 100 + i*80);
  });
}

// ── JOURNEY ──
let current = 0;
let animTimers = [];
// Track which "reveal" slides have been revealed
const revealedSlides = new Set();

function buildJourney() {
  const bar = document.getElementById('journey');
  JOURNEY.forEach((section,si) => {
    const step = document.createElement('div');
    step.className = 'journey-step';
    step.dataset.si = si;
    step.innerHTML = `<div class="journey-dot"><div class="journey-icon">${section.icon}</div><div class="journey-label">${section.label}</div></div>`;
    bar.appendChild(step);
    if (si < JOURNEY.length-1) {
      const line = document.createElement('div');
      line.className = 'journey-line';
      line.dataset.li = si;
      bar.appendChild(line);
    }
  });
}

function updateJourney() {
  JOURNEY.forEach((section,si) => {
    const step = document.querySelector(`.journey-step[data-si="${si}"]`);
    if (!step) return;
    const isActive = section.slides.includes(current);
    const isDone = section.slides[section.slides.length-1] < current;
    step.classList.toggle('active', isActive);
    step.classList.toggle('done', isDone && !isActive);
  });
}

function buildSlide(i, active) {
  const s = slides[i];
  const div = document.createElement('div');
  div.className = 'slide' + (s.type==='hero' ? ' hero hero-warm' : '') + (active ? ' active' : '');
  div.dataset.index = i;
  if (s.type==='hero') {
    div.innerHTML = `<div class="slide-body" style="align-items:center;justify-content:center;text-align:center;padding:32px 60px;">${s.body}</div>`;
  } else {
    div.innerHTML = `
      <div style="background:var(--burgundy);padding:10px 48px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:1;">
        <span style="font-size:18px;color:var(--amber);">✝</span>
        <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.65);letter-spacing:0.12em;text-transform:uppercase;">Incarnation Mantua · PREP Day 2</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;margin-left:auto;">${i+1} / ${slides.length}</span>
      </div>
      <div class="slide-body">${s.body}</div>`;
  }
  return div;
}

function animateSlide(slideEl) {
  animTimers.forEach(t=>clearTimeout(t));
  animTimers = [];
  function safe(el,fn,delay){ animTimers.push(setTimeout(()=>{ if(el&&el.classList) fn(el); }, delay)); }

  slideEl.querySelectorAll('[data-anim]').forEach(el => {
    el.style.opacity='0';
    requestAnimationFrame(()=>{ if(el&&el.style){ el.style.opacity=''; el.style.transform=''; }});
  });
  slideEl.querySelectorAll('.bullet-list li').forEach((li,i)=>{ li.classList.remove('visible'); safe(li,el=>el.classList.add('visible'),120+i*110); });
  slideEl.querySelectorAll('.card').forEach((c,i)=>{ c.classList.remove('visible'); safe(c,el=>el.classList.add('visible'),150+i*80); });
  slideEl.querySelectorAll('.sched-item').forEach((s,i)=>{ s.classList.remove('visible'); safe(s,el=>el.classList.add('visible'),100+i*80); });
  slideEl.querySelectorAll('.fade-in').forEach((el,i)=>{ el.classList.remove('visible'); safe(el,e=>e.classList.add('visible'),80+i*120); });
  slideEl.querySelectorAll('.virtue-panel').forEach((el,i)=>{ el.classList.remove('visible'); safe(el,e=>e.classList.add('visible'),150+i*100); });
  slideEl.querySelectorAll('.corner-tag').forEach((el,i)=>{ el.classList.remove('visible'); safe(el,e=>e.classList.add('visible'),150+i*100); });
  slideEl.querySelectorAll('.virtue-type-card,.super-card').forEach((el,i)=>{ el.classList.remove('visible'); safe(el,e=>e.classList.add('visible'),150+i*120); });

  // Restore reveal state for slides that had been revealed
  const revealEl = slideEl.querySelector('.arrow-reveal');
  if (revealEl && revealedSlides.has(current)) {
    revealEl.classList.add('shown');
  }

  if (slideEl.querySelector('#hero-card-grid')) buildHeroCards();
  if (slideEl.querySelector('#game-grid')) buildGameCards();
  // Mystery player slide
  const idx = parseInt(slideEl.dataset.index);
  if (!isNaN(idx) && slides[idx] && slides[idx].isMysteryPlayer) {
    currentMysteryIndex = 0;
    setTimeout(() => renderMysteryPlayer(0), 50); // slight delay ensures DOM is ready
  }
}

function init() {
  buildJourney();
  const deck = document.getElementById('deck');
  slides.forEach((s,i)=>deck.appendChild(buildSlide(i, i===0)));
  animateSlide(deck.querySelector('.slide.active'));
  updateJourney(); updateNav(); updateProgress();
}

function changeSlide(dir) {
  const deck = document.getElementById('deck');
  const oldSlide = deck.querySelector('.slide.active');
  // If we're ON the mystery player and going back, always jump to chooser (slide 28)
  if (dir === -1 && slides[current] && slides[current].isMysteryPlayer) {
    goToSlide(28); // 28 = Which Mysteries chooser
    return;
  }
  // If we're ON the mystery player and going forward, only advance if all 5 done
  if (dir === 1 && slides[current] && slides[current].isMysteryPlayer) {
    if (currentMysteryIndex < 4) {
      renderMysteryPlayer(currentMysteryIndex + 1);
      return;
    }
    // All 5 done — fall through to advance deck slide
  }
  const newIdx = current + dir;

  // If going FORWARD and current slide has a hidden reveal not yet shown — show it first
  if (dir === 1 && slides[current].hasReveal) {
    const revealEl = oldSlide.querySelector('.arrow-reveal');
    if (revealEl && !revealEl.classList.contains('shown')) {
      revealEl.classList.add('shown');
      revealedSlides.add(current);
      return; // Don't advance yet
    }
  }

  if (newIdx < 0 || newIdx >= slides.length) return;

  oldSlide.classList.add('exit');
  oldSlide.classList.remove('active');

  const newSlide = deck.querySelector(`.slide[data-index="${newIdx}"]`);
  newSlide.style.transform = dir>0 ? 'translateY(28px)' : 'translateY(-28px)';
  newSlide.style.opacity = '0';
  newSlide.style.transition = 'none';

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      newSlide.style.transition = '';
      newSlide.classList.add('active');
      newSlide.style.transform = '';
      newSlide.style.opacity = '';
      animateSlide(newSlide);
    });
  });

  setTimeout(()=>{ oldSlide.classList.remove('exit'); oldSlide.style.transform=''; oldSlide.style.opacity=''; }, 600);

  current = newIdx;
  updateJourney(); updateNav(); updateProgress();
}

function goToSlide(targetIdx) {
  const deck = document.getElementById('deck');
  const oldSlide = deck.querySelector('.slide.active');
  if (targetIdx < 0 || targetIdx >= slides.length || targetIdx === current) return;
  if (!oldSlide) return;
  const newSlide = deck.querySelector(`.slide[data-index="${targetIdx}"]`);
  if (!newSlide) return;
  const dir = targetIdx > current ? 1 : -1;
  oldSlide.classList.add('exit');
  oldSlide.classList.remove('active');
  newSlide.style.transform = dir > 0 ? 'translateY(28px)' : 'translateY(-28px)';
  newSlide.style.opacity = '0';
  newSlide.style.transition = 'none';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      newSlide.style.transition = '';
      newSlide.classList.add('active');
      newSlide.style.transform = '';
      newSlide.style.opacity = '';
      animateSlide(newSlide);
    });
  });
  setTimeout(()=>{ oldSlide.classList.remove('exit'); oldSlide.style.transform=''; oldSlide.style.opacity=''; }, 600);
  current = targetIdx;
  updateJourney(); updateNav(); updateProgress();
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===slides.length-1;
  document.getElementById('nav-title').textContent = slides[current].title;
}
function updateProgress() {
  document.getElementById('progress').style.width = ((current+1)/slides.length*100)+'%';
}
function syncFsBtn() {
  const inFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const btn=document.getElementById('fsBtn');
  btn.textContent=inFs?'✕':'⛶'; btn.title=inFs?'Exit Fullscreen':'Fullscreen';
}
function toggleFullscreen() {
  const inFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(!inFs){ const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen(); else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(); }
  else { if(document.exitFullscreen) document.exitFullscreen(); else if(document.webkitExitFullscreen) document.webkitExitFullscreen(); }
}
document.addEventListener('fullscreenchange',syncFsBtn);
document.addEventListener('webkitfullscreenchange',syncFsBtn);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') changeSlide(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') changeSlide(-1);
});

init();
</script>
</body>
</html>
