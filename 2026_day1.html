<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREP Day 1 – The Life of Grace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #1B4F8C;
  --blue-light: #E8F0FB;
  --blue-mid: #4A7EC0;
  --blue-dark: #0f2d52;
  --gold: #C9A227;
  --gold-light: #FDF4DC;
  --gold-dark: #9A7A1A;
  --white: #FAFAF8;
  --gray: #6B7280;
  --gray-light: #F3F4F6;
  --text: #1C1C1E;
  --text-muted: #555;
}

html, body {
  width: 100%; height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--blue-dark);
  overflow: hidden;
}

/* ── JOURNEY BAR ── */
#journey {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: var(--blue-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 8px 24px;
  z-index: 200;
}
.journey-step {
  display: flex;
  align-items: center;
  gap: 0;
}
.journey-dot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: default;
}
.journey-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.4s ease;
}
.journey-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  transition: color 0.4s ease;
  white-space: nowrap;
}
.journey-line {
  width: 40px; height: 2px;
  background: rgba(255,255,255,0.15);
  margin: 0 2px;
  margin-bottom: 14px;
  transition: background 0.4s ease;
}
.journey-step.active .journey-icon {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(201,162,39,0.5);
}
.journey-step.active .journey-label { color: var(--gold); }
.journey-step.done .journey-icon {
  background: rgba(201,162,39,0.3);
  border-color: rgba(201,162,39,0.5);
}
.journey-step.done .journey-label { color: rgba(255,255,255,0.5); }
.journey-step.done + .journey-line,
.journey-step.active + .journey-line { background: rgba(201,162,39,0.4); }

/* ── DECK ── */
#deck {
  position: fixed;
  top: 62px; bottom: 52px; left: 0; right: 0;
  overflow: hidden;
}

/* ── SLIDES ── */
.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--white);
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none;
  overflow: hidden;
}
.slide.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.slide.exit {
  opacity: 0;
  transform: translateY(-20px);
}

/* ── HERO SLIDES ── */
.slide.hero {
  background: var(--blue-dark);
  justify-content: center;
  align-items: center;
}
.slide.hero-gold {
  background: linear-gradient(135deg, #0f2d52 0%, #1B4F8C 60%, #1a3a6b 100%);
}

/* ── LIGHT RAY ── */
.ray {
  position: absolute;
  top: -100px; left: -100px;
  width: 600px; height: 600px;
  background: conic-gradient(
    from 200deg at 0% 0%,
    transparent 0deg,
    rgba(201,162,39,0.07) 15deg,
    transparent 30deg,
    rgba(201,162,39,0.04) 48deg,
    transparent 62deg
  );
  pointer-events: none;
  z-index: 0;
  animation: shimmer 9s ease-in-out infinite alternate;
}
@keyframes shimmer {
  from { opacity: 0.6; transform: rotate(-4deg) scale(1); }
  to   { opacity: 1;   transform: rotate(4deg) scale(1.05); }
}

/* ── SLIDE BODY ── */
.slide-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 72px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* ── TYPOGRAPHY ── */
h1.slide-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5.5vw, 4rem);
  font-weight: 700;
  color: var(--blue);
  line-height: 1.1;
  margin-bottom: 14px;
}
h2.slide-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.7rem, 4vw, 2.8rem);
  font-weight: 700;
  color: var(--blue);
  line-height: 1.2;
  margin-bottom: 16px;
}
h1.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 700;
  color: #fff;
  line-height: 1.05;
  text-align: center;
  margin-bottom: 16px;
}
h2.hero-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  text-align: center;
  line-height: 1.5;
  max-width: 600px;
}
.hero-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(4rem, 12vw, 9rem);
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  line-height: 1;
  letter-spacing: -0.02em;
}
.hero-def {
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: rgba(255,255,255,0.8);
  text-align: center;
  max-width: 640px;
  line-height: 1.6;
  margin-top: 20px;
}
.hero-simpler {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: rgba(201,162,39,0.85);
  text-align: center;
  margin-top: 12px;
}
.hero-cross {
  font-size: clamp(3rem, 7vw, 5rem);
  color: var(--gold);
  text-align: center;
  margin-bottom: 20px;
  display: block;
  animation: pulse-cross 3s ease-in-out infinite;
}
@keyframes pulse-cross {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.75; transform: scale(0.97); }
}

.body-text {
  font-size: clamp(0.95rem, 1.9vw, 1.15rem);
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 760px;
}

/* ── ANIMATED BULLETS ── */
.bullet-list { list-style: none; margin-top: 8px; }
.bullet-list li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  font-size: clamp(0.95rem, 1.8vw, 1.15rem);
  color: var(--text);
  padding: 7px 0;
  line-height: 1.5;
  opacity: 0;
  transform: translateX(-16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.bullet-list li.visible {
  opacity: 1;
  transform: translateX(0);
}
.bullet-list li::before {
  content: '';
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
  margin-top: 7px;
}

/* ── SECTION BADGE ── */
.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--blue-light);
  color: var(--blue);
  border-radius: 999px;
  padding: 5px 16px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* ── CARDS ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 14px;
  margin-top: 18px;
}
.card {
  background: var(--blue-light);
  border-radius: 14px;
  padding: 18px 20px;
  border: 1px solid rgba(27,79,140,0.15);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.card.visible { opacity: 1; transform: translateY(0); }
.card .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue-mid); margin-bottom: 5px; }
.card .card-text { font-size: 1rem; color: var(--blue); font-weight: 600; line-height: 1.3; }

/* ── FLIP CARDS ── */
.flip-wrap {
  display: flex;
  gap: 24px;
  margin-top: 20px;
  justify-content: center;
  flex-wrap: wrap;
}
.flip-card {
  width: 280px;
  height: 160px;
  perspective: 900px;
  cursor: pointer;
}
.flip-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s ease;
}
.flip-card.flipped .flip-inner { transform: rotateY(180deg); }
.flip-front, .flip-back {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
.flip-front {
  background: var(--blue);
  border: 2px solid rgba(201,162,39,0.3);
}
.flip-front .flip-word {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 8px;
}
.flip-front .flip-hint {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.flip-back {
  background: var(--gold-light);
  border: 2px solid var(--gold);
  transform: rotateY(180deg);
}
.flip-back .flip-def {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.5;
}
.flip-back .flip-simpler {
  font-size: 0.82rem;
  color: var(--gold-dark);
  font-style: italic;
  margin-top: 8px;
}

/* ── HIGHLIGHT & CALLOUT BOXES ── */
.highlight-box {
  background: var(--gold-light);
  border-left: 4px solid var(--gold);
  border-radius: 0 12px 12px 0;
  padding: 16px 22px;
  margin: 14px 0;
  max-width: 720px;
}
.highlight-box .hb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 5px; }
.highlight-box p { font-size: 1rem; color: var(--text); line-height: 1.6; }

.blue-box {
  background: var(--blue);
  border-radius: 14px;
  padding: 20px 26px;
  margin: 14px 0;
  max-width: 760px;
}
.blue-box p { color: #fff; font-size: 1.05rem; line-height: 1.6; }
.blue-box .bb-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }

.discuss-box {
  display: inline-flex;
  align-items: flex-start;
  gap: 14px;
  background: var(--gray-light);
  border-radius: 14px;
  padding: 16px 20px;
  margin-top: 16px;
  max-width: 720px;
}
.discuss-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
.discuss-text { font-size: 0.98rem; color: var(--text); line-height: 1.5; }
.discuss-text strong { color: var(--blue); font-weight: 600; display: block; margin-bottom: 3px; }

/* ── VOCAB TAGS ── */
.vocab-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.vocab-tag {
  background: var(--blue);
  color: #fff;
  border-radius: 999px;
  padding: 6px 18px;
  font-size: 0.9rem;
  font-weight: 500;
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.vocab-tag.visible { opacity: 1; transform: scale(1); }

/* ── SCHEDULE ── */
.schedule-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-top: 16px;
}
.sched-item {
  background: var(--blue-light);
  border-radius: 12px;
  padding: 12px 14px;
  border-left: 3px solid var(--blue);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.sched-item.visible { opacity: 1; transform: translateY(0); }
.sched-item.gold-accent { border-color: var(--gold); }
.sched-time { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--blue); margin-bottom: 3px; }
.sched-item.gold-accent .sched-time { color: var(--gold-dark); }
.sched-label { font-size: 0.88rem; color: var(--text); font-weight: 500; line-height: 1.3; }

/* ── INTRO PROMPT ── */
.intro-prompt {
  background: var(--blue-light);
  border-radius: 16px;
  padding: 20px 26px;
  margin-top: 16px;
  max-width: 720px;
  line-height: 1.7;
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--text);
}
.intro-prompt strong { color: var(--blue); }

/* ── TWO-COL ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }

/* ── HEART SVG WRAPPER ── */
.heart-demo {
  display: flex;
  align-items: center;
  gap: 40px;
  margin-top: 12px;
}
.heart-svg-wrap {
  flex-shrink: 0;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.heart-svg-wrap.visible { opacity: 1; transform: scale(1); }

/* ── STAGGERED FADE ── */
.fade-in {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: var(--blue-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 200;
}
#nav button {
  background: none; border: none;
  color: rgba(255,255,255,0.8);
  font-size: 18px; cursor: pointer;
  padding: 6px 14px; border-radius: 8px;
  transition: background 0.2s, color 0.2s;
  font-weight: 600;
}
#nav button:hover { background: rgba(255,255,255,0.12); color: #fff; }
#nav button:disabled { opacity: 0.25; cursor: default; }
#nav-title { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; min-width: 200px; text-align: center; letter-spacing: 0.04em; }

/* ── PROGRESS ── */
#progress { position: fixed; top: 62px; left: 0; height: 2px; background: var(--gold); transition: width 0.4s ease; z-index: 300; }
</style>
</head>
<body>

<!-- Journey bar -->
<div id="journey"></div>
<div id="progress"></div>
<div id="deck"></div>
<div id="nav">
  <button id="prevBtn" onclick="changeSlide(-1)" disabled>&#8592;</button>
  <span id="nav-title"></span>
  <button id="nextBtn" onclick="changeSlide(1)">&#8594;</button>

let current = 0;
let animTimers = [];

// Build journey bar
function buildJourney() {
  const bar = document.getElementById('journey');
  JOURNEY.forEach((section, si) => {
    const step = document.createElement('div');
    step.className = 'journey-step';
    step.dataset.si = si;
    step.innerHTML = `
      <div class="journey-dot">
        <div class="journey-icon">${section.icon}</div>
        <div class="journey-label">${section.label}</div>
      </div>`;
    bar.appendChild(step);
    if (si < JOURNEY.length - 1) {
      const line = document.createElement('div');
      line.className = 'journey-line';
      line.dataset.li = si;
      bar.appendChild(line);
    }
  });
}

function updateJourney() {
  JOURNEY.forEach((section, si) => {
    const step = document.querySelector(`.journey-step[data-si="${si}"]`);
    if (!step) return;
    const isActive = section.slides.includes(current);
    const isDone = section.slides[section.slides.length - 1] < current;
    step.classList.toggle('active', isActive);
    step.classList.toggle('done', isDone && !isActive);
  });
}

// Build slides
function buildSlide(i, active) {
  const s = slides[i];
  const div = document.createElement('div');
  div.className = 'slide' + (s.type === 'hero' ? ' hero hero-gold' : '') + (active ? ' active' : '');
  div.dataset.index = i;

  if (s.type === 'hero') {
    div.innerHTML = `<div class="slide-body" style="align-items:center;justify-content:center;text-align:center;padding:32px 60px;">${s.body}</div>`;
  } else {
    div.innerHTML = `
      <div style="background:var(--blue);padding:10px 48px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:1;">
        <span style="font-size:18px;color:var(--gold);">✝</span>
        <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.65);letter-spacing:0.12em;text-transform:uppercase;">Incarnation Mantua · PREP Day 1</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;margin-left:auto;">${i+1} / ${slides.length}</span>
      </div>
      <div class="slide-body">${s.body}</div>`;
  }
  return div;
}

function animateSlide(slideEl) {
  // Cancel any pending timers from previous slide
  animTimers.forEach(t => clearTimeout(t));
  animTimers = [];

  function safe(el, fn, delay) {
    animTimers.push(setTimeout(() => { if (el && el.classList) fn(el); }, delay));
  }

  // Hero data-anim elements
  slideEl.querySelectorAll('[data-anim]').forEach(el => {
    el.style.opacity = '0';
    requestAnimationFrame(() => {
      if (el && el.style) { el.style.opacity = ''; el.style.transform = ''; }
    });
  });

  // Staggered bullets
  slideEl.querySelectorAll('.bullet-list li').forEach((li, i) => {
    li.classList.remove('visible');
    safe(li, el => el.classList.add('visible'), 120 + i * 110);
  });

  // Cards
  slideEl.querySelectorAll('.card').forEach((c, i) => {
    c.classList.remove('visible');
    safe(c, el => el.classList.add('visible'), 150 + i * 80);
  });

  // Vocab tags
  slideEl.querySelectorAll('.vocab-tag').forEach((t, i) => {
    t.classList.remove('visible');
    safe(t, el => el.classList.add('visible'), 200 + i * 70);
  });

  // Schedule items
  slideEl.querySelectorAll('.sched-item').forEach((s, i) => {
    s.classList.remove('visible');
    safe(s, el => el.classList.add('visible'), 100 + i * 80);
  });

  // Fade-ins
  slideEl.querySelectorAll('.fade-in').forEach((el, i) => {
    el.classList.remove('visible');
    safe(el, e => e.classList.add('visible'), 80 + i * 120);
  });
}

function init() {
  buildJourney();
  const deck = document.getElementById('deck');
  slides.forEach((s, i) => deck.appendChild(buildSlide(i, i === 0)));
  animateSlide(deck.querySelector('.slide.active'));
  updateJourney();
  updateNav();
  updateProgress();
}

function changeSlide(dir) {
  const deck = document.getElementById('deck');
  const oldSlide = deck.querySelector('.slide.active');
  const newIdx = current + dir;
  if (newIdx < 0 || newIdx >= slides.length) return;

  oldSlide.classList.add('exit');
  oldSlide.classList.remove('active');

  const newSlide = deck.querySelector(`.slide[data-index="${newIdx}"]`);
  newSlide.style.transform = dir > 0 ? 'translateY(28px)' : 'translateY(-28px)';
  newSlide.style.opacity = '0';
  newSlide.style.transition = 'none';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newSlide.style.transition = '';
      newSlide.classList.add('active');
      newSlide.style.transform = '';
      newSlide.style.opacity = '';
      animateSlide(newSlide);
    });
  });

  setTimeout(() => {
    oldSlide.classList.remove('exit');
    oldSlide.style.transform = '';
    oldSlide.style.opacity = '';
  }, 600);

  current = newIdx;
  updateJourney();
  updateNav();
  updateProgress();
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === slides.length - 1;
  document.getElementById('nav-title').textContent = slides[current].title;
}

function updateProgress() {
  const pct = ((current + 1) / slides.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});

init();
</script>
